  <text x="340" y="646" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(175,169,236)">max(0, x)  ·  non-linearity</text>
</g>
<line x1="340" y1="658" x2="340" y2="690" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="674" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 512)</text>

<!-- ── Dropout2  p=0.3 ── -->
<g onclick="sendPrompt('Why is dropout p=0.3 used before the final linear layer?')">
  <rect x="190" y="692" width="300" height="44" rx="8" stroke-width="0.5"
        fill="rgb(99,56,6)" stroke="rgb(239,159,39)"/>
  <text x="340" y="708" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(250,199,117)">Dropout</text>
  <text x="340" y="724" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(239,159,39)">p=0.30  ·  training only</text>
</g>
<line x1="340" y1="736" x2="340" y2="768" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="752" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 512)</text>

<!-- ── fc3  512→300 ── -->
<g onclick="sendPrompt('Why does the final output layer use bias=True unlike the earlier linear layers?')">
  <rect x="150" y="770" width="380" height="56" rx="8" stroke-width="0.5"
        fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
  <text x="340" y="790" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(206,203,246)">fc3  ·  Linear</text>
  <text x="340" y="810" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(175,169,236)">in=512 → out=300  ·  bias=True</text>
</g>
<line x1="340" y1="826" x2="340" y2="858" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="842" dominant-baseline="central"
