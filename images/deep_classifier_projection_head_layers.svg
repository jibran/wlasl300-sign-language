<svg width="100%" viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <mask id="gap-mask" maskUnits="userSpaceOnUse">
    <rect x="0" y="0" width="680" height="1020" fill="white"/>
    <!-- mask out label text so the dashed rule reads cleanly behind it -->
    <rect x="30" y="29" width="56" height="18" fill="black" rx="2"/>
    <rect x="30" y="118" width="110" height="18" fill="black" rx="2"/>
    <rect x="30" y="208" width="90" height="18" fill="black" rx="2"/>
    <rect x="30" y="298" width="66" height="18" fill="black" rx="2"/>
    <rect x="30" y="386" width="66" height="18" fill="black" rx="2"/>
    <rect x="30" y="476" width="100" height="18" fill="black" rx="2"/>
    <rect x="30" y="566" width="66" height="18" fill="black" rx="2"/>
    <rect x="30" y="656" width="110" height="18" fill="black" rx="2"/>
    <rect x="30" y="746" width="66" height="18" fill="black" rx="2"/>
    <rect x="30" y="38"  width="56" height="18" fill="black" rx="2"/>
    <rect x="30" y="906" width="96" height="18" fill="black" rx="2"/>
  </mask>
</defs>

<!-- ─────────────────────────────────── -->
<!--  Shared style shorthand via inline  -->
<!-- ─────────────────────────────────── -->

<!-- ── Input ── -->
<g onclick="sendPrompt('What does the backbone feature vector contain?')">
  <rect x="190" y="20" width="300" height="44" rx="8" stroke-width="0.5"
        fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
  <text x="340" y="36"  text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(211,209,199)">Backbone feature vector</text>
  <text x="340" y="52"  text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(180,178,169)">(B, 2048)  ·  float32</text>
</g>
<line x1="340" y1="64" x2="340" y2="96" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="80" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 2048)</text>

<!-- ── fc1  2048→1024 ── -->
<g onclick="sendPrompt('Why does fc1 use no bias when BatchNorm follows immediately after?')">
  <rect x="150" y="98" width="380" height="56" rx="8" stroke-width="0.5"
        fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
  <text x="340" y="118" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(206,203,246)">fc1  ·  Linear</text>
  <text x="340" y="138" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(175,169,236)">in=2048 → out=1024  ·  bias=False</text>
</g>
<line x1="340" y1="154" x2="340" y2="186" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="170" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 1024)</text>

<!-- ── BN1 ── -->
<g onclick="sendPrompt('Why is BatchNorm1d placed after each linear layer in the deep head?')">
  <rect x="150" y="188" width="380" height="56" rx="8" stroke-width="0.5"
        fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
  <text x="340" y="208" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(206,203,246)">BatchNorm1d</text>
  <text x="340" y="228" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(175,169,236)">num_features=1024  ·  normalise + scale + shift</text>
</g>
<line x1="340" y1="244" x2="340" y2="276" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="260" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 1024)</text>

<!-- ── ReLU1 ── -->
<g onclick="sendPrompt('What does ReLU introduce in the deep classifier head?')">
  <rect x="190" y="278" width="300" height="44" rx="8" stroke-width="0.5"
        fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
  <text x="340" y="294" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(206,203,246)">ReLU</text>
  <text x="340" y="310" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(175,169,236)">max(0, x)  ·  non-linearity</text>
</g>
<line x1="340" y1="322" x2="340" y2="354" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="338" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 1024)</text>

<!-- ── Dropout1  p=0.4 ── -->
<g onclick="sendPrompt('Why is dropout p=0.4 used after the first hidden layer?')">
  <rect x="190" y="356" width="300" height="44" rx="8" stroke-width="0.5"
        fill="rgb(99,56,6)" stroke="rgb(239,159,39)"/>
  <text x="340" y="372" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(250,199,117)">Dropout</text>
  <text x="340" y="388" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(239,159,39)">p=0.40  ·  training only</text>
</g>
<line x1="340" y1="400" x2="340" y2="432" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="416" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 1024)</text>

<!-- ── fc2  1024→512 ── -->
<g onclick="sendPrompt('What role does the second linear layer play in the deep classifier head?')">
  <rect x="150" y="434" width="380" height="56" rx="8" stroke-width="0.5"
        fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
  <text x="340" y="454" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(206,203,246)">fc2  ·  Linear</text>
  <text x="340" y="474" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(175,169,236)">in=1024 → out=512  ·  bias=False</text>
</g>
<line x1="340" y1="490" x2="340" y2="522" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="506" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 512)</text>

<!-- ── BN2 ── -->
<g onclick="sendPrompt('Why add a second BatchNorm1d before the final classification layer?')">
  <rect x="150" y="524" width="380" height="56" rx="8" stroke-width="0.5"
        fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
  <text x="340" y="544" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="14" font-weight="500" fill="rgb(206,203,246)">BatchNorm1d</text>
  <text x="340" y="564" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(175,169,236)">num_features=512  ·  normalise + scale + shift</text>
</g>
<line x1="340" y1="580" x2="340" y2="612" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="548" y="596" dominant-baseline="central"
      font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
      font-size="12" fill="rgb(194,192,182)">(B, 512)</text>

<!-- ── ReLU2 ── -->
<g onclick="sendPrompt('Why does the second ReLU come before the final linear layer?')">
  <rect x="190" y="614" width="300" height="44" rx="8" stroke-width="0.5"
        fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
  <text x="340" y="630" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
