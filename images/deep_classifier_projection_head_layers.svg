  <text x="340" y="892" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        font-size="12" font-weight="400" fill="rgb(93,202,165)">(B, 300)  ·  one logit per class</text>
</g>

