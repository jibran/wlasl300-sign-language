      font-size="12" fill="rgb(194,192,182)">(B, 300)</text>

<!-- ── Output logits ── -->
<g onclick="sendPrompt('How are the 300 raw logits converted to a class prediction?')">
  <rect x="190" y="860" width="300" height="44" rx="8" stroke-width="0.5"
        fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>
  <text x="340" y="876" text-anchor="middle" dominant-baseline="central"
        font-family="&quot;Anthropic Sans&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
