
<style>
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:0 0 20px;}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:16px;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 0 20px;}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;}
.stat .lbl{font-size:11px;color:var(--color-text-secondary);margin:0 0 3px;}
.stat .val{font-size:18px;font-weight:500;margin:0;}
.stat .sub{font-size:11px;color:var(--color-text-tertiary);margin:2px 0 0;}
.legend{display:flex;gap:16px;margin:0 0 8px;font-size:12px;color:var(--color-text-secondary);flex-wrap:wrap;}
.legend span{display:flex;align-items:center;gap:5px;}
.swatch{width:22px;height:3px;border-radius:2px;display:inline-block;}
</style>

<div class="stat-row">
  <div class="stat">
    <p class="lbl">Classifier (2-layer)</p>
    <p class="val">14.0%</p>
    <p class="sub">val top-1 · test 13.1%</p>
  </div>
  <div class="stat">
    <p class="lbl">Deep (3-layer)</p>
    <p class="val">12.5%</p>
    <p class="sub">val top-1 · test 12.8%</p>
  </div>
  <div class="stat">
    <p class="lbl">Embedding (DeViSE)</p>
    <p class="val">12.0%</p>
    <p class="sub">val top-1 · test 8.8%</p>
  </div>
  <div class="stat">
    <p class="lbl">Linear probe</p>
    <p class="val">9.7%</p>
    <p class="sub">val top-1 · test 8.8%</p>
  </div>
</div>

<div class="grid2">
  <div class="card">
    <div class="legend">
      <span><b class="swatch" style="background:#534AB7"></b>Classifier</span>
      <span><b class="swatch" style="background:#1D9E75"></b>Deep</span>
      <span><b class="swatch" style="background:#D85A30"></b>Embedding</span>
      <span><b class="swatch" style="background:#888780"></b>Linear</span>
    </div>
    <div style="position:relative;height:220px;"><canvas id="top1Chart"></canvas></div>
  </div>
  <div class="card">
    <div class="legend">
      <span><b class="swatch" style="background:#534AB7"></b>Classifier</span>
      <span><b class="swatch" style="background:#1D9E75"></b>Deep</span>
      <span><b class="swatch" style="background:#D85A30"></b>Embedding</span>
      <span><b class="swatch" style="background:#888780"></b>Linear</span>
    </div>
    <div style="position:relative;height:220px;"><canvas id="top5Chart"></canvas></div>
  </div>
</div>

<div class="card" style="margin:0 0 16px;">
  <div style="position:relative;height:180px;"><canvas id="embeddingFull"></canvas></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const PURPLE='#534AB7', TEAL='#1D9E75', CORAL='#D85A30', GRAY='#888780';
const grid='rgba(128,128,128,0.12)';

const clf_top1=[0.033,0.043,0.065,0.077,0.094,0.088,0.099,0.106,0.095,0.105,0.100,0.095,0.099,0.112,0.132,0.127,0.121,0.125,0.140,0.127].map(v=>+(v*100).toFixed(1));
const clf_top5=[0.092,0.132,0.188,0.204,0.227,0.245,0.263,0.282,0.281,0.281,0.241,0.274,0.300,0.276,0.294,0.303,0.313,0.343,0.339,0.326].map(v=>+(v*100).toFixed(1));

const deep_top1=[0.026,0.022,0.045,0.054,0.074,0.077,0.074,0.088,0.095,0.094,0.070,0.081,0.096,0.095,0.111,0.109,0.112,0.112,0.117,0.125].map(v=>+(v*100).toFixed(1));
const deep_top5=[0.081,0.112,0.151,0.175,0.206,0.216,0.237,0.243,0.255,0.256,0.212,0.230,0.280,0.295,0.298,0.308,0.303,0.298,0.327,0.330].map(v=>+(v*100).toFixed(1));

const lin_top1=[0.020,0.022,0.042,0.045,0.061,0.054,0.068,0.065,0.071,0.070,0.053,0.066,0.054,0.066,0.079,0.078,0.076,0.092,0.096,0.081].map(v=>+(v*100).toFixed(1));
const lin_top5=[0.055,0.094,0.126,0.156,0.158,0.172,0.190,0.190,0.199,0.194,0.160,0.170,0.176,0.189,0.212,0.205,0.208,0.219,0.227,0.230].map(v=>+(v*100).toFixed(1));

const emb_top1_20=[0.1,0.6,0.9,1.0,1.5,1.3,1.5,1.5,1.6,1.8,1.5,2.3,2.1,2.2,2.8,2.9,3.4,4.2,3.4,2.9];
const emb_top5_20=[2.6,3.9,5.5,5.4,6.5,7.6,7.7,8.2,8.2,9.0,8.2,9.3,8.8,9.5,10.1,11.5,11.7,13.2,12.8,12.8];
const labels20=Array.from({length:20},(_,i)=>i+1);

const opts=(yLabel)=>({
  responsive:true, maintainAspectRatio:false, animation:false,
  plugins:{legend:{display:false}},
  scales:{
    x:{grid:{color:grid},ticks:{font:{size:10},color:'#888'}},
    y:{grid:{color:grid},title:{display:true,text:yLabel,font:{size:10},color:'#888'},ticks:{font:{size:10},color:'#888'}}
  }
});

new Chart(document.getElementById('top1Chart'),{
  type:'line',
  data:{labels:labels20,datasets:[
    {label:'Classifier',data:clf_top1,borderColor:PURPLE,borderWidth:2,pointRadius:0,tension:0.3},
    {label:'Deep',data:deep_top1,borderColor:TEAL,borderWidth:2,pointRadius:0,tension:0.3},
    {label:'Embedding (phase 1)',data:emb_top1_20,borderColor:CORAL,borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.3},
    {label:'Linear',data:lin_top1,borderColor:GRAY,borderWidth:2,pointRadius:0,tension:0.3},
  ]},
  options:{...opts('val top-1 (%)'),plugins:{legend:{display:false},title:{display:true,text:'Val top-1 accuracy — first 20 epochs',font:{size:12}}}}
});

new Chart(document.getElementById('top5Chart'),{
  type:'line',
  data:{labels:labels20,datasets:[
    {label:'Classifier',data:clf_top5,borderColor:PURPLE,borderWidth:2,pointRadius:0,tension:0.3},
    {label:'Deep',data:deep_top5,borderColor:TEAL,borderWidth:2,pointRadius:0,tension:0.3},
    {label:'Embedding (phase 1)',data:emb_top5_20,borderColor:CORAL,borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.3},
    {label:'Linear',data:lin_top5,borderColor:GRAY,borderWidth:2,pointRadius:0,tension:0.3},
  ]},
  options:{...opts('val top-5 (%)'),plugins:{legend:{display:false},title:{display:true,text:'Val top-5 accuracy — first 20 epochs',font:{size:12}}}}
});

const emb_full_top1=[0.1,0.6,0.9,1.0,1.5,1.3,1.5,1.5,1.6,1.8,1.5,2.3,2.1,2.2,2.8,2.9,3.4,4.2,3.4,2.9,3.7,4.9,5.4,4.6,4.8,5.1,5.3,6.6,4.9,5.9,5.5,7.7,7.0,8.8,9.2,9.0,9.5,12.0,10.5,10.4,11.1,10.3,10.6];
const emb_labels=Array.from({length:43},(_,i)=>i+1);
new Chart(document.getElementById('embeddingFull'),{
  type:'line',
  data:{labels:emb_labels,datasets:[
    {label:'Embedding val top-1',data:emb_full_top1,borderColor:CORAL,borderWidth:2,pointRadius:0,tension:0.3,fill:false},
  ]},
  options:{
    responsive:true,maintainAspectRatio:false,animation:false,
    plugins:{legend:{display:false},title:{display:true,text:'Embedding model — full 43 epochs (phases 1→2→3)',font:{size:12}}},
    scales:{
      x:{grid:{color:grid},ticks:{font:{size:10},color:'#888'},title:{display:true,text:'Epoch',font:{size:10}}},
      y:{grid:{color:grid},title:{display:true,text:'val top-1 (%)',font:{size:10},color:'#888'},ticks:{font:{size:10},color:'#888'}},
    },
    plugins:{
      legend:{display:false},
      annotation:{annotations:{
        p2:{type:'line',xMin:20.5,xMax:20.5,borderColor:'rgba(128,128,128,0.4)',borderWidth:1,borderDash:[4,3],label:{display:true,content:'Phase 2',position:'start',font:{size:10}}},
        p3:{type:'line',xMin:40.5,xMax:40.5,borderColor:'rgba(128,128,128,0.4)',borderWidth:1,borderDash:[4,3],label:{display:true,content:'Phase 3',position:'start',font:{size:10}}}
      }}
    }
  }
});
</script>
